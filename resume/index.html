  <style>
    :root {
      --pink: #f4c9d6;
      --brown: #3e2723;
      --paper: #fdf8f4;
      --serif: "Labrada", Georgia, serif;
      --sans: "DM Sans", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      min-height: 100dvh;
      margin: 0;
      display: flex;
      flex-direction: column;
      background: var(--paper);
      color: var(--brown);
      font-family: var(--sans);
    }
    a { color: inherit; }
    :focus-visible { outline: 2px solid currentColor; outline-offset: 3px; }
    header {
      min-height: 68px;
      padding: 0.8rem clamp(1rem, 4vw, 2.5rem);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      background: var(--pink);
    }
    .brand {
      font: italic 900 clamp(1.45rem, 4vw, 2rem)/1 var(--serif);
      letter-spacing: -0.03em;
      text-decoration: none;
    }
    nav { display: flex; align-items: center; gap: clamp(1rem, 3vw, 2rem); }
    nav a {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-underline-offset: 4px;
    }
    .download {
      padding: 0.5rem 0.75rem;
      border: 1px solid rgba(62, 39, 35, 0.35);
      text-decoration: none;
    }
    .resume-frame {
      width: 100%;
      flex: 1;
      border: 0;
      background: var(--paper);
    }
    .fallback { padding: 2rem; text-align: center; }
    @media (max-width: 520px) {
      header { min-height: 62px; }
      nav { gap: 0.8rem; }
      nav a { font-size: 0.7rem; letter-spacing: 0.08em; }
      .download { padding: 0.4rem 0.55rem; }
    }
  </style>
